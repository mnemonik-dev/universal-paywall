# Foundry config for @universal-paywall/contracts
#
# Toolchain bootstrap (local dev):
#   curl -L https://foundry.paradigm.xyz | bash
#   foundryup
# After install, verify: `forge --version && anvil --version && cast --version`.
# CI uses the `foundry-rs/foundry-toolchain@v1` action (configured in Task 12).
#
# Canonical env-var names for the contracts workspace (see deployment.md and
# iteration-2-systemic-fixes §3): `ARC_RPC_URL` for the JSON-RPC endpoint,
# `DEPLOYER_KEY` for the deploy EOA private key, and `ARC_VERIFY_API_KEY` for
# the verifier API key. These three names are the only ones permitted; legacy
# `*_TESTNET_*` variants are forbidden across the workspace.
#
# Solidity tests live under `test/`; their mocks live under `test/mocks/`. forge
# auto-compiles everything under the `test` path, so mocks do NOT pollute `src/`
# (production sources) — see iteration-4-addendum §2.
#
# After cloning the repo, materialize the OZ + forge-std submodules with:
#   git submodule update --init --recursive
# before running `forge build`. The submodule commit SHA (not the `.gitmodules`
# `branch =` line) is what pins OpenZeppelin to v5.0.2.

[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
